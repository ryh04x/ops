<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <title>VVIP Mission Control</title>
    <style>
        /* Global body reset: Modern SaaS Slate Dark Mode */
        body { background: #020617; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
        
        /* Glassmorphism utility */
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Active filter state */
        .filter-btn { transition: all 0.2s ease; }
        .filter-btn.active { background: rgba(14, 165, 233, 0.15); border-color: #0ea5e9; color: #38bdf8; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* Base flight card styling */
        .flight-card { min-height: 380px; display: flex; flex-direction: column; border-radius: 1rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .flight-card:hover { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); transform: translateY(-2px); }
        
        /* Checkbox color customization */
        .vvip-check { accent-color: #0ea5e9; width: 14px; height: 14px; cursor: pointer; border-radius: 3px; }
        
        /* Softened Critical Risk Alert */
        .risk-glow { animation: risk-pulse 2.5s infinite; border-color: rgba(239, 68, 68, 0.5) !important; }
        /* Softened Permit Warning */
        .permit-glow { animation: permit-pulse 2.5s infinite; border-color: rgba(249, 115, 22, 0.5) !important; }
        
        @keyframes risk-pulse { 
            0% { box-shadow: inset 0 0 0px rgba(239, 68, 68, 0); } 
            50% { box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.15), 0 0 10px rgba(239, 68, 68, 0.1); } 
            100% { box-shadow: inset 0 0 0px rgba(239, 68, 68, 0); } 
        }
        @keyframes permit-pulse { 
            0% { box-shadow: inset 0 0 0px rgba(249, 115, 22, 0); } 
            50% { box-shadow: inset 0 0 15px rgba(249, 115, 22, 0.15), 0 0 10px rgba(249, 115, 22, 0.1); } 
            100% { box-shadow: inset 0 0 0px rgba(249, 115, 22, 0); } 
        }
        
        /* Custom scrollbar styling */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Card flip animation styles */
        .card-flip { perspective: 1000px; }
        .card-flip-inner { position: relative; width: 100%; height: 100%; text-align: left; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card-flipped .card-flip-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 1rem; overflow: hidden; }
        .card-back { transform: rotateY(180deg); background: #0f172a; border-color: rgba(14, 165, 233, 0.3); }

        /* Data Manifest Row */
        .manifest-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .manifest-row:last-child { border-bottom: none; }

        /* Status Select Styling */
        select.status-dropdown option { background-color: #0f172a; color: #cbd5e1; font-weight: 500; }

        @media (max-width: 1024px) {
            .flight-card { min-height: 350px; }
            header { padding-left: 1.5rem; padding-right: 1.5rem; }
        }

        @media (max-width: 768px) {
            body { font-size: 14px; }
            .flight-card { min-height: 370px; }
            header { height: auto; min-height: 4rem; flex-wrap: wrap; gap: 0.75rem; padding: 1rem; }
            input[type="text"], input[type="number"], input[type="email"], input[type="password"], input[type="datetime-local"], textarea {
                font-size: 16px !important; 
            }
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden flex flex-col">

    <div id="toast-container" class="fixed top-5 right-5 z-[200] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm sm:w-auto"></div>

    <div id="notif-sidebar" class="fixed inset-y-0 right-0 w-[85vw] sm:w-96 bg-slate-900 border-l border-slate-800 z-[60] transform translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="p-4 sm:p-5 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
            <div><h3 class="text-sm font-bold tracking-wide text-sky-400">Audit Control Log</h3></div>
            <button onclick="toggleNotifs()" class="text-slate-500 hover:text-white p-2 -mr-2"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="p-4 border-b border-slate-800">
            <input type="text" id="notif-search" oninput="filterLogs()" placeholder="Search logs by Tail..." class="w-full bg-slate-950 border border-slate-700 p-3 rounded-lg text-sm text-white outline-none focus:border-sky-500">
        </div>
        <div id="log-container" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar"></div>
        <div class="p-4 border-t border-slate-800 bg-slate-950/30 pb-safe">
            <button onclick="fetchLogs(true)" class="w-full py-3 text-xs font-semibold uppercase text-slate-400 hover:text-sky-400 transition-colors tracking-wider rounded-lg border border-slate-700 hover:border-sky-500/50">Load Older History</button>
        </div>
    </div>

    <div id="login-screen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4 sm:p-6 text-center">
        <div class="glass w-full max-w-sm p-6 sm:p-8 rounded-2xl shadow-2xl border border-slate-800">
            <div class="flex justify-center mb-6">
                <i data-lucide="plane-takeoff" class="w-10 h-10 text-sky-500"></i>
            </div>
            <h1 class="text-2xl font-bold mb-6 text-white tracking-tight">VVIP Ops Center</h1>
            
            <form onsubmit="event.preventDefault(); handleLogin();" class="w-full">
                <input type="email" id="email" placeholder="Email" required autocomplete="email" class="w-full bg-slate-900/80 border border-slate-700 p-3.5 rounded-lg mb-4 text-white outline-none focus:border-sky-500 text-base">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password" class="w-full bg-slate-900/80 border border-slate-700 p-3.5 rounded-lg mb-6 text-white outline-none focus:border-sky-500 text-base">
                
                <button type="submit" id="login-btn" class="w-full bg-sky-600 hover:bg-sky-500 py-3.5 rounded-lg font-semibold text-white transition-all shadow-lg shadow-sky-900/20 text-sm flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <div id="main-dashboard" class="hidden h-screen flex flex-col">
        <header class="h-auto sm:h-16 border-b border-slate-800 px-4 sm:px-8 py-3 flex justify-between items-center bg-slate-900 shrink-0">
            <div class="flex items-center gap-3">
                <i data-lucide="plane-takeoff" class="w-5 h-5 text-sky-400 shrink-0"></i>
                <h1 class="text-base sm:text-lg font-bold text-white tracking-tight truncate">Mission Control</h1>
            </div>
            <div class="flex items-center gap-3 sm:gap-5">
                <button id="admin-audit-btn" onclick="toggleNotifs()" class="hidden relative p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-all"><i data-lucide="activity" class="w-5 h-5"></i><span id="notif-dot" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-sky-500 border-2 border-slate-900 rounded-full"></span></button>
                <div class="h-5 w-px bg-slate-700 hidden sm:block"></div>
                <span id="user-display" class="text-xs font-medium text-slate-400 hidden sm:block"></span>
                <button onclick="handleLogout()" class="text-xs font-semibold text-slate-400 hover:text-red-400 transition-colors p-2 -mr-2 sm:p-0 sm:mr-0">Sign Out</button>
            </div>
        </header>

        <main class="flex-1 p-4 sm:p-6 overflow-y-auto bg-slate-950 custom-scrollbar pb-24">
            
            <div id="admin-analytics" class="hidden grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 mb-6">
                <div class="bg-slate-900 border border-slate-800 p-3 sm:p-4 rounded-xl flex flex-col justify-center shadow-sm">
                    <p class="text-[9px] sm:text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">This Week</p>
                    <p id="stat-week" class="text-xl sm:text-2xl font-bold text-sky-400 leading-none">0</p>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-3 sm:p-4 rounded-xl flex flex-col justify-center shadow-sm">
                    <p class="text-[9px] sm:text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">This Month</p>
                    <p id="stat-month" class="text-xl sm:text-2xl font-bold text-white leading-none">0</p>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-3 sm:p-4 rounded-xl flex flex-col justify-center shadow-sm">
                    <p class="text-[9px] sm:text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">This Year</p>
                    <p id="stat-year" class="text-xl sm:text-2xl font-bold text-white leading-none">0</p>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-3 sm:p-4 rounded-xl flex flex-col justify-center shadow-sm">
                    <p class="text-[9px] sm:text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Total Operated</p>
                    <p id="stat-total" class="text-xl sm:text-2xl font-bold text-white leading-none">0</p>
                </div>
            </div>

            <div class="mb-6 sm:mb-8 flex justify-center">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl px-4 sm:px-8 py-4 sm:py-5 w-full max-w-xl text-center shadow-md">
                    <p class="text-[9px] sm:text-[10px] font-semibold uppercase tracking-widest text-slate-500 mb-1">Universal Coordinated Time</p>
                    <p id="utc-clock" class="text-3xl sm:text-4xl md:text-5xl font-mono font-bold text-sky-400 tracking-tight">00:00:00</p>
                    <p id="utc-date" class="mt-1 text-[10px] sm:text-xs text-slate-400 font-medium">Loading...</p>
                </div>
            </div>

            <div class="flex flex-col gap-4 mb-6 pb-4 border-b border-slate-800/50">
                <div class="flex overflow-x-auto hide-scroll snap-x gap-2 w-full pb-1">
                    <button onclick="setFilter('all')" id="btn-all" class="filter-btn active px-4 py-2 rounded-lg text-xs font-semibold border border-transparent text-slate-300 hover:bg-slate-800 whitespace-nowrap snap-start shrink-0">All</button>
                    <button onclick="setFilter('today')" id="btn-today" class="filter-btn px-4 py-2 rounded-lg text-xs font-medium border border-transparent text-slate-400 hover:bg-slate-800 hover:text-slate-200 whitespace-nowrap snap-start shrink-0">Today</button>
                    <button onclick="setFilter('tomorrow')" id="btn-tomorrow" class="filter-btn px-4 py-2 rounded-lg text-xs font-medium border border-transparent text-slate-400 hover:bg-slate-800 hover:text-slate-200 whitespace-nowrap snap-start shrink-0">Tomorrow</button>
                    <button onclick="setFilter('week')" id="btn-week" class="filter-btn px-4 py-2 rounded-lg text-xs font-medium border border-transparent text-slate-400 hover:bg-slate-800 hover:text-slate-200 whitespace-nowrap snap-start shrink-0">Week</button>
                    <button onclick="setFilter('month')" id="btn-month" class="filter-btn px-4 py-2 rounded-lg text-xs font-medium border border-transparent text-slate-400 hover:bg-slate-800 hover:text-slate-200 whitespace-nowrap snap-start shrink-0">Month</button>
                    <div class="w-px bg-slate-800 mx-1 hidden sm:block shrink-0"></div>
                    <button onclick="setFilter('overflying')" id="btn-overflying" class="filter-btn px-4 py-2 rounded-lg text-xs font-medium border border-transparent text-sky-400/80 hover:bg-sky-500/10 whitespace-nowrap snap-start shrink-0">Overflight</button>
                    <button onclick="setFilter('risk')" id="btn-risk" class="filter-btn px-4 py-2 rounded-lg text-xs font-medium border border-transparent text-red-400/80 hover:bg-red-500/10 whitespace-nowrap snap-start shrink-0">Risks</button>
                    <button onclick="setFilter('permit')" id="btn-permit" class="filter-btn px-4 py-2 rounded-lg text-xs font-medium border border-transparent text-orange-400/80 hover:bg-orange-500/10 whitespace-nowrap snap-start shrink-0">Permits</button>
                </div>
                <div class="relative w-full md:w-72 md:ml-auto">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-[11px] text-slate-500"></i>
                    <input type="text" id="search-input" oninput="applyFilter()" placeholder="Search flights..." class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-9 pr-4 py-2.5 sm:py-2 text-sm text-white outline-none focus:border-sky-500 transition-colors">
                </div>
            </div>

            <div id="flight-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6"></div>

            <div id="completed-section" class="mt-10 hidden">
                <div class="flex items-center gap-4 mb-6">
                    <div class="h-px flex-1 bg-slate-800"></div>
                    <h3 class="text-[10px] sm:text-xs font-semibold text-slate-500 uppercase tracking-widest whitespace-nowrap">Archived Records</h3>
                    <div class="h-px flex-1 bg-slate-800"></div>
                </div>
                <div id="completed-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 opacity-75 hover:opacity-100 transition-opacity duration-300"></div>
                <div id="archive-load-more-container" class="mt-8 flex justify-center hidden">
                    <button onclick="loadMoreArchives()" class="px-6 py-3 sm:py-2.5 bg-slate-900 border border-slate-700 rounded-lg text-xs font-semibold text-slate-400 hover:text-white hover:border-slate-500 transition-all">Load More History</button>
                </div>
            </div>
            
            <button onclick="openScheduleModal()" class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 bg-sky-500 text-white w-14 h-14 rounded-full shadow-xl shadow-sky-500/30 flex items-center justify-center hover:bg-sky-400 hover:scale-105 transition-all z-[50]"><i data-lucide="plus" class="w-6 h-6"></i></button>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden z-[110] flex items-center justify-center p-3 sm:p-4">
        <div class="bg-slate-900 w-full max-w-lg p-5 sm:p-8 rounded-2xl border border-slate-700 shadow-2xl max-h-[95vh] overflow-y-auto custom-scrollbar relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 sm:top-5 sm:right-5 text-slate-500 hover:text-white transition-colors z-10 bg-slate-800 sm:bg-transparent rounded-full p-1"><i data-lucide="x" class="w-5 h-5"></i></button>
            <h2 id="modal-title" class="text-lg sm:text-xl font-bold text-white mb-5 sm:mb-6">Schedule Mission</h2>
            
            <form id="flight-form" onsubmit="event.preventDefault(); addOrUpdateFlight();" class="space-y-3 sm:space-y-4">
                <div id="mission-type-container" class="flex p-1 bg-slate-950 rounded-lg border border-slate-800">
                    <button type="button" onclick="setMissionType('landing')" id="type-landing" class="flex-1 py-2 rounded-md text-xs font-semibold transition-all bg-slate-800 text-white shadow-sm">Landing</button>
                    <button type="button" onclick="setMissionType('overflying')" id="type-overflying" class="flex-1 py-2 rounded-md text-xs font-medium transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800/50">Overflying</button>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Registration</label>
                        <input id="new-tail" type="text" placeholder="N12345" required class="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-sm text-white uppercase focus:border-sky-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Operator</label>
                        <input id="new-operator" type="text" placeholder="Operator Name" required class="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-sm text-white uppercase focus:border-sky-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Aircraft Type</label>
                        <input id="new-aircraft-type" type="text" placeholder="GLF6" required class="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-sm text-white uppercase focus:border-sky-500 outline-none">
                    </div>
                    <div>
                        <label id="mtow-label" class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">MTOW (kg)</label>
                        <input id="new-mtow" type="number" placeholder="45000" required class="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-sm text-white focus:border-sky-500 outline-none transition-opacity">
                    </div>
                </div>

                <div class="bg-slate-950/50 p-3 sm:p-4 rounded-xl border border-slate-800">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 mb-3 sm:mb-4">
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Call Sign (Opt)</label>
                            <input id="new-callsign" type="text" placeholder="VVIP01" class="w-full bg-slate-900 border border-slate-700 p-2.5 sm:p-2 rounded-md text-sm sm:text-xs text-white uppercase focus:border-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Captain (Opt)</label>
                            <input id="new-captain" type="text" placeholder="Name" class="w-full bg-slate-900 border border-slate-700 p-2.5 sm:p-2 rounded-md text-sm sm:text-xs text-white uppercase focus:border-sky-500 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 sm:gap-4 mb-3 sm:mb-4">
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Crew</label>
                            <input id="new-crew-count" type="number" placeholder="0" class="w-full bg-slate-900 border border-slate-700 p-2.5 sm:p-2 rounded-md text-sm sm:text-xs text-white focus:border-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Pax</label>
                            <input id="new-pax-count" type="number" placeholder="0" class="w-full bg-slate-900 border border-slate-700 p-2.5 sm:p-2 rounded-md text-sm sm:text-xs text-white focus:border-sky-500 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Permit No</label>
                            <input id="new-permit-no" type="text" placeholder="TBA" class="w-full bg-slate-900 border border-slate-700 p-2.5 sm:p-2 rounded-md text-sm sm:text-xs text-white uppercase focus:border-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Handling Agent</label>
                            <input id="new-ground-handling" type="text" placeholder="Agent Name" class="w-full bg-slate-900 border border-slate-700 p-2.5 sm:p-2 rounded-md text-sm sm:text-xs text-white uppercase focus:border-sky-500 outline-none transition-opacity">
                        </div>
                    </div>
                </div>

                <div id="country-field" class="hidden">
                    <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Overflight Country</label>
                    <input id="new-country" type="text" placeholder="France" class="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-sm text-white uppercase focus:border-sky-500 outline-none">
                </div>
                
                <div id="services-fields" class="hidden bg-slate-950/50 p-3 sm:p-4 rounded-xl border border-slate-800">
                    <p class="text-[10px] font-semibold text-slate-400 mb-3 uppercase tracking-wider">Requested Services</p>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center gap-2 text-sm sm:text-xs font-medium text-slate-300 cursor-pointer">
                            <input type="checkbox" id="new-catering" class="vvip-check w-4 h-4 sm:w-[14px] sm:h-[14px]"> Catering
                        </label>
                        <label class="flex items-center gap-2 text-sm sm:text-xs font-medium text-slate-300 cursor-pointer">
                            <input type="checkbox" id="new-transport" class="vvip-check w-4 h-4 sm:w-[14px] sm:h-[14px]"> Transport
                        </label>
                        <label class="flex items-center gap-2 text-sm sm:text-xs font-medium text-slate-300 cursor-pointer">
                            <input type="checkbox" id="new-fuel" class="vvip-check w-4 h-4 sm:w-[14px] sm:h-[14px]"> Fuel
                        </label>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-end mb-1.5">
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Schedule (Local Time)</label>
                        <span id="utc-preview" class="text-[9px] font-bold text-sky-400 uppercase tracking-widest hidden"></span>
                    </div>
                    <input id="new-etd" type="datetime-local" oninput="updateUtcPreview(this.value)" required class="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-sm text-white [color-scheme:dark] focus:border-sky-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-3 sm:gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Origin (ICAO)</label>
                        <input id="new-origin" type="text" placeholder="KJFK" maxlength="4" required class="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-sm text-white uppercase font-mono focus:border-sky-500 outline-none">
                    </div>
                    <div>

        function formatFlightZulu(date) {
            return `${String(date.getUTCDate()).padStart(2, '0')} ${MONTH_NAMES[date.getUTCMonth()]} ${date.getUTCFullYear()} ${String(date.getUTCHours()).padStart(2, '0')}:${String(date.getUTCMinutes()).padStart(2, '0')}`;

        }

        function parseFlightDate(flight, referenceDate = new Date()) {
            const raw = flight?.etd_zulu?.trim();
            if (!raw) return new Date(NaN);
            const parts = raw.split(/\s+/);
            if (parts.length < 3) return new Date(NaN);

            const day = parseInt(parts[0], 10);
            const monthIndex = MONTH_MAP[parts[1]];
            let year;
            let timeToken;
            if (parts.length >= 4) {
                if (!/^\d{4}$/.test(parts[2])) return new Date(NaN);
                year = parseInt(parts[2], 10);
                timeToken = parts[3];
            } else {
                timeToken = parts[2];
            }
            const [hours, minutes] = (timeToken || '').split(':').map(Number);
            if ([day, monthIndex, hours, minutes].some(v => Number.isNaN(v) || v === undefined)) return new Date(NaN);

            if (Number.isInteger(year)) { return new Date(Date.UTC(year, monthIndex, day, hours, minutes)); }

            const now = referenceDate;
            year = now.getUTCFullYear();
            let d = new Date(Date.UTC(year, monthIndex, day, hours, minutes));
            if (d.getTime() - now.getTime() > 180 * 86400000) d.setUTCFullYear(year - 1);
            else if (now.getTime() - d.getTime() > 180 * 86400000) d.setUTCFullYear(year + 1);
            return d;
        }

        function getFlightMeta(flight, now = new Date()) {
            const flightDate = parseFlightDate(flight, now);
            const invalidDate = Number.isNaN(flightDate.getTime());
            const diffMs = invalidDate ? Number.POSITIVE_INFINITY : now.getTime() - flightDate.getTime();
            const hoursTo = invalidDate ? Number.POSITIVE_INFINITY : (flightDate.getTime() - now.getTime()) / 3600000;
            const isChecklistIncomplete = flight.mission_type === 'overflying'
                ? !flight.permit_ready
                : (!flight.permit_ready || !flight.slot_ready || !flight.crew_visa_ready || !flight.pax_visa_ready);
            const isArrived = flight.status === 'Arrived';
            const isDeparted = flight.status === 'Departed';
            
            const isArchived = isArrived || (!isDeparted && diffMs > 86400000);
            const isInProgress = !isArchived && (diffMs >= 0 || isDeparted);
            const isRisk = !isArchived && !isInProgress && hoursTo <= 72 && hoursTo >= 0 && isChecklistIncomplete;
            const isPermitPending = !isArchived && !flight.permit_ready;
            
            return { flightDate, invalidDate, diffMs, hoursTo, isChecklistIncomplete, isArchived, isInProgress, isRisk, isPermitPending };
        }

        async function updateChecklist(id, field, checkboxElement) {
            const f = allFlights.find(x => x.id === id);
            if (!f || !checkboxElement) return;
            const meta = getFlightMeta(f);
            if (meta.isArchived || f.status === 'Departed' || f.status === 'Arrived') { checkboxElement.checked = !checkboxElement.checked; return; }
            
            const value = checkboxElement.checked;

            if (field === 'permit_ready' && value === true) {
                if (!f.permit_number || f.permit_number.trim() === '') {
                    checkboxElement.checked = false;
                    showToast("COMPLIANCE ERROR: Cannot verify Permit Status without a valid Permit Number.", 'error');
                    return;
                }
            }

            let updates = { [field]: value };
            if (f.mission_type === 'overflying') {
                updates.status = value ? 'Ready' : 'Pending';
            } else {
                const checks = { permit: field === 'permit_ready' ? value : !!f.permit_ready, slot: field === 'slot_ready' ? value : !!f.slot_ready, crewV: field === 'crew_visa_ready' ? value : !!f.crew_visa_ready, paxV: field === 'pax_visa_ready' ? value : !!f.pax_visa_ready };
                updates.status = (checks.permit && checks.slot && checks.crewV && checks.paxV) ? 'Ready' : 'Pending';
            }
            
            const ok = await safeUpdateFlight(id, updates);
            if (!ok) { checkboxElement.checked = !value; return; }
            
            const niceFieldName = field.replace('_ready', '').replace('_', ' ').toUpperCase();
            createLog(`Flight ${f.tail_number}: Changed ${niceFieldName} to ${value ? 'COMPLETED' : 'PENDING'}`);
        }

                mission_type: selectedMissionType, country: selectedMissionType === 'overflying' ? document.getElementById('new-country').value.trim().toUpperCase() : null,
                aircraft_type: document.getElementById('new-aircraft-type').value.trim().toUpperCase(),
                mtow: document.getElementById('new-mtow').value ? parseInt(document.getElementById('new-mtow').value) : null,
                operator_name: document.getElementById('new-operator').value.trim() || null,
                call_sign: document.getElementById('new-callsign').value.trim().toUpperCase() || null,
                captain: document.getElementById('new-captain').value.trim().toUpperCase() || null,
                crew_count: document.getElementById('new-crew-count').value ? parseInt(document.getElementById('new-crew-count').value) : null,
                pax_count: document.getElementById('new-pax-count').value ? parseInt(document.getElementById('new-pax-count').value) : null,
                permit_number: document.getElementById('new-permit-no').value.trim().toUpperCase() || null,
                ground_handling: selectedMissionType === 'landing' ? document.getElementById('new-ground-handling').value.trim().toUpperCase() || null : null,
                catering_service: selectedMissionType === 'landing' ? document.getElementById('new-catering').checked : false,
                transport_service: selectedMissionType === 'landing' ? document.getElementById('new-transport').checked : false,
                fuel_service: selectedMissionType === 'landing' ? document.getElementById('new-fuel').checked : false,
                remarks: document.getElementById('new-remarks').value.trim() || null
            };
            
            if (editingFlightId) { 
                const old = allFlights.find(x => x.id === editingFlightId);
                let changes = [];
                if (old.mission_type !== payload.mission_type) changes.push(`Mission changed to ${payload.mission_type.toUpperCase()}`);
                if (old.tail_number !== payload.tail_number) changes.push(`Reg: ${old.tail_number} -> ${payload.tail_number}`);
                if (old.etd_zulu !== payload.etd_zulu) changes.push(`Time: ${old.etd_zulu} -> ${payload.etd_zulu}`);
                if (old.origin_icao !== payload.origin_icao) changes.push(`Origin: ${old.origin_icao} -> ${payload.origin_icao}`);
                if (old.dest_icao !== payload.dest_icao) changes.push(`Dest: ${old.dest_icao} -> ${payload.dest_icao}`);
                if (old.aircraft_type !== payload.aircraft_type) changes.push(`Aircraft: ${old.aircraft_type} -> ${payload.aircraft_type}`);
                if (old.mtow !== payload.mtow) changes.push(`MTOW: ${old.mtow} -> ${payload.mtow}`);
                if (old.operator_name !== payload.operator_name) changes.push(`Operator: ${old.operator_name} -> ${payload.operator_name}`);
                if (old.call_sign !== payload.call_sign) changes.push(`Callsign updated`);
                if (old.captain !== payload.captain) changes.push(`Captain updated`);
                if (old.permit_number !== payload.permit_number) changes.push(`Permit No updated`);
                if (selectedMissionType === 'landing' && old.ground_handling !== payload.ground_handling) changes.push(`Handling updated`);
                if (old.remarks !== payload.remarks) changes.push(`Remarks updated`);
                
                const ok = await safeUpdateFlight(editingFlightId, payload); 
                if (!ok) return;
                
                if (changes.length > 0) {
                    createLog(`Flight ${payload.tail_number} config updated: ${changes.join(' | ')}`);
                }
                showToast('Mission Configuration Saved');
            }
            else { 
                try {
                    const { error } = await _supabase.from('vvip_flights').insert([{ ...payload, status: 'Pending' }]); 
                    if (error) throw error;
                    createLog(`Flight ${tail} newly scheduled for ${payload.origin_icao} to ${payload.dest_icao}`); 
                    showToast('New Mission Scheduled');
                } catch(err) {
                    showToast(err.message, 'error');
                    return;
                }
            }
            closeModal();
        }

        function toggleNotifs() {
            const sidebar = document.getElementById('notif-sidebar');
            sidebar.classList.toggle('translate-x-full');
            if (!sidebar.classList.contains('translate-x-full')) { document.getElementById('notif-dot').classList.add('hidden'); fetchLogs(); }
            lucide.createIcons();
        }

        async function fetchLogs(allHistory = false) {
            try {
                let query = _supabase.from('vvip_logs').select('*').order('created_at', { ascending: false });
                if (!allHistory) query = query.limit(30);
                else { const sevenDaysAgo = new Date(); sevenDaysAgo.setUTCDate(sevenDaysAgo.getUTCDate() - 7); query = query.gte('created_at', sevenDaysAgo.toISOString()); }
                const { data, error } = await query; 
                if (error) throw error;
                if (data) { allLogs = data; filterLogs(); }
            } catch(e) { console.error(e); }
        }

        function filterLogs() {
            const searchInput = document.getElementById('notif-search'), container = document.getElementById('log-container');
            if (!searchInput || !container) return;
            const search = searchInput.value.toLowerCase();
            const filtered = allLogs.filter(log => (log.action_details || '').toLowerCase().includes(search) || (log.user_email || '').toLowerCase().includes(search));
            container.innerHTML = filtered.map(log => `
                <div class="bg-slate-800 border-l-[3px] border-sky-500 p-3 rounded-r-lg mb-2">
                    <div class="flex justify-between items-center mb-1.5"><span class="font-bold text-slate-300 text-[10px] uppercase tracking-wider">${safeText((log.user_email || '').split('@')[0])}</span><span class="text-[9px] text-slate-500 font-medium">${formatZuluDate(log.created_at)}</span></div>
                    <p class="text-[11px] text-slate-400 leading-relaxed">${safeText(log.action_details || '')}</p>
                </div>
            `).join('');
        }

        async function fetchFlights() { 
            try {
                const { data, error } = await _supabase.from('vvip_flights').select('*').order('created_at', { ascending: false }); 
                if (error) throw error;
                if (data) { allFlights = data; applyFilter(); } 
            } catch(e) {
                showToast("Failed to sync flights. Check connection.", "error");
            }
        }

        function setFilter(f) { activeFilter = f; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); document.getElementById(`btn-${f}`)?.classList.add('active'); applyFilter(); }

        function applyFilter() {
            const searchInput = document.getElementById('search-input');
            if (!searchInput) return;
            const search = searchInput.value.toLowerCase().trim(), now = new Date();
            const tomorrow = new Date(now); tomorrow.setUTCDate(now.getUTCDate() + 1);
            const filtered = allFlights.filter(f => {
                const haystack = [f.tail_number, f.origin_icao, f.dest_icao, f.country, f.operator_name].filter(Boolean).join(' ').toLowerCase();
                if (search && !haystack.includes(search)) return false;
                const meta = getFlightMeta(f, now);
                if (meta.invalidDate) return false;

                if (activeFilter === 'overflying') return f.mission_type === 'overflying' && !meta.isArchived;
                if (activeFilter === 'today') return meta.flightDate.getUTCFullYear() === now.getUTCFullYear() && meta.flightDate.getUTCMonth() === now.getUTCMonth() && meta.flightDate.getUTCDate() === now.getUTCDate();
                if (activeFilter === 'tomorrow') return meta.flightDate.getUTCFullYear() === tomorrow.getUTCFullYear() && meta.flightDate.getUTCMonth() === tomorrow.getUTCMonth() && meta.flightDate.getUTCDate() === tomorrow.getUTCDate();
                if (activeFilter === 'risk') return meta.isRisk;
                if (activeFilter === 'permit') return !meta.isArchived && !f.permit_ready;
                if (activeFilter === 'week') { const diff = (meta.flightDate - now) / 86400000; return diff >= -1 && diff <= 7; }
                if (activeFilter === 'month') return meta.flightDate.getUTCMonth() === now.getUTCMonth() && meta.flightDate.getUTCFullYear() === now.getUTCFullYear();
                return true;
            });
            render(filtered, now);
        }

        function loadMoreArchives() { archiveLimit += 9; applyFilter(); }

        function render(filteredFlights, now = new Date()) {
            const activeGrid = document.getElementById('flight-grid'), completedGrid = document.getElementById('completed-grid');
            let activeObjects = [], completedObjects = [], weekT = 0, monthT = 0, yearT = 0, allT = 0;
            
            allFlights.forEach(f => {
                const meta = getFlightMeta(f, now);
                if (!meta.invalidDate && meta.isArchived) { 
                    allT++; 
                    if (meta.diffMs >= 0 && meta.diffMs <= 7 * 86400000) weekT++; 
                    if (meta.diffMs >= 0 && meta.flightDate.getUTCMonth() === now.getUTCMonth() && meta.flightDate.getUTCFullYear() === now.getUTCFullYear()) monthT++; 
                    if (meta.diffMs >= 0 && meta.flightDate.getUTCFullYear() === now.getUTCFullYear()) yearT++; 
                }
            });

            filteredFlights.forEach(f => {
                const meta = getFlightMeta(f, now);
                if (meta.invalidDate) return;
                if (meta.isArchived) completedObjects.push({ html: generateCard(f, false, false, true, false, false), date: meta.flightDate });
                else activeObjects.push({ html: generateCard(f, meta.isRisk, meta.isPermitPending, false, false, meta.isInProgress), date: meta.flightDate, inProgress: meta.isInProgress });
            });

            activeObjects.sort((a,b) => (a.inProgress && !b.inProgress) ? -1 : (!a.inProgress && b.inProgress) ? 1 : a.date - b.date);
            activeGrid.innerHTML = activeObjects.map(obj => obj.html).join('');
            completedObjects.sort((a,b) => b.date - a.date);
            completedGrid.innerHTML = completedObjects.slice(0, archiveLimit).map(obj => obj.html).join('');
            document.getElementById('completed-section').classList.toggle('hidden', completedObjects.length === 0);
            document.getElementById('archive-load-more-container').classList.toggle('hidden', completedObjects.length <= archiveLimit);
            if (currentUserRole === 'admin') { document.getElementById('stat-week').innerText = weekT.toString(); document.getElementById('stat-month').innerText = monthT.toString(); document.getElementById('stat-year').innerText = yearT.toString(); document.getElementById('stat-total').innerText = allT.toString(); }
            lucide.createIcons();
        }

        // --- RENDER CARDS ---
        function generateCard(f, isRisk, isPermitPending, isArchived, isMissed, isInProgress) {
            
            let borderClass = 'border-slate-800'; 
            if (isArchived) borderClass = 'border-slate-800 opacity-70';
            else if (isInProgress) borderClass = 'border-sky-500/50 shadow-[0_0_20px_rgba(14,165,233,0.15)]';
            else if (isRisk) borderClass = 'border-red-500/40 shadow-[0_0_15px_rgba(239,68,68,0.1)]';
            else if (isPermitPending) borderClass = 'border-orange-500/40 shadow-[0_0_15px_rgba(249,115,22,0.1)]';
            else if (f.status === 'Ready') borderClass = 'border-emerald-500/30';

            let pillClass = 'bg-slate-800 text-slate-300';
            if (isArchived) pillClass = 'bg-slate-800 text-slate-400';
            else if (isInProgress) pillClass = 'bg-sky-500/10 text-sky-400 border border-sky-500/20 animate-pulse';
            else if (isRisk) pillClass = 'bg-red-500/10 text-red-400 border border-red-500/20';
            else if (isPermitPending) pillClass = 'bg-orange-500/10 text-orange-400 border border-orange-500/20';
            else if (f.status === 'Ready') pillClass = 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';

            const statusText = isArchived ? 'ARCHIVED' : (isInProgress ? 'IN PROGRESS' : (isRisk ? 'ACTION REQ' : (isPermitPending ? 'PERMIT PEND' : f.status.toUpperCase())));

            const overflyBadge = f.mission_type === 'overflying' ? `<span class="ml-2 px-1.5 py-0.5 rounded-sm bg-slate-800 border border-slate-700 text-[9px] font-semibold text-slate-400 uppercase tracking-wider shrink-0 align-middle">${safeText(f.country || 'N/A')}</span>` : '';

            let checklistHTML = '';
            if (!isArchived) {
                if (f.mission_type === 'overflying') {
                    checklistHTML = `
                        <label class="flex items-center gap-2 text-xs font-medium text-slate-300 checklist-item col-span-2 w-full cursor-pointer">
                            <input type="checkbox" class="vvip-check" ${f.permit_ready ? 'checked' : ''} onchange="updateChecklist('${f.id}', 'permit_ready', this)"> Permit Verified
                        </label>`;
                } else {
                    checklistHTML = `
                        <label class="flex items-center gap-2 text-[10px] font-medium text-slate-300 checklist-item cursor-pointer">
                            <input type="checkbox" class="vvip-check" ${f.permit_ready ? 'checked' : ''} onchange="updateChecklist('${f.id}', 'permit_ready', this)"> Permit
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-medium text-slate-300 checklist-item cursor-pointer">
                            <input type="checkbox" class="vvip-check" ${f.slot_ready ? 'checked' : ''} onchange="updateChecklist('${f.id}', 'slot_ready', this)"> Slot
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-medium text-slate-300 checklist-item cursor-pointer">
                            <input type="checkbox" class="vvip-check" ${f.crew_visa_ready ? 'checked' : ''} onchange="updateChecklist('${f.id}', 'crew_visa_ready', this)"> Crew Visa
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-medium text-slate-300 checklist-item cursor-pointer">
                            <input type="checkbox" class="vvip-check" ${f.pax_visa_ready ? 'checked' : ''} onchange="updateChecklist('${f.id}', 'pax_visa_ready', this)"> Pax Visa
                        </label>`;
                }
            }

            let servicesArr = [];
            if (f.mission_type === 'landing') {
                if (f.catering_service) servicesArr.push('<i data-lucide="utensils" class="w-3 h-3 text-slate-400"></i>');
                if (f.transport_service) servicesArr.push('<i data-lucide="car" class="w-3 h-3 text-slate-400"></i>');
                if (f.fuel_service) servicesArr.push('<i data-lucide="fuel" class="w-3 h-3 text-slate-400"></i>');
            }
            const servicesSection = servicesArr.length > 0 ? `<div class="flex items-center gap-1.5 ml-auto border-l border-slate-700 pl-3 shrink-0">${servicesArr.join('')}</div>` : '';

            // FRONT CARD (Secured Output)
            const frontCard = `
                <div class="p-4 sm:p-6 flex-1 flex flex-col h-full bg-slate-900 rounded-[1rem]">
                    <div class="flex justify-between items-start mb-4 gap-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center mb-1.5">
                                <h2 class="text-xl font-bold text-white tracking-tight leading-none truncate">${safeText(f.tail_number)}</h2>
                                ${overflyBadge}
                            </div>
                            <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest truncate">${safeText(f.operator_name || 'PRIVATE')}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2 shrink-0">
                            <span class="px-2.5 py-1 rounded-md text-[9px] font-bold tracking-wider ${pillClass} whitespace-nowrap">${statusText}</span>
                            <div class="flex gap-1.5">
                                ${(!isArchived || currentUserRole === 'admin') ? `<button type="button" onclick="openEditModal('${f.id}');" class="text-slate-500 hover:text-sky-400 p-1"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>` : ''}
                                ${currentUserRole === 'admin' ? `<button type="button" onclick="deleteFlight('${f.id}');" class="text-slate-500 hover:text-red-400 p-1"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-950 rounded-xl border border-slate-800 p-4 mb-4 flex items-center justify-between">
                        <div class="text-2xl font-mono font-bold text-white">${safeText(f.origin_icao)}</div>
                        <div class="flex-1 px-4 flex flex-col items-center">
                            <span class="text-[10px] font-medium text-slate-400 tracking-widest mb-1.5 flex items-center gap-1 whitespace-nowrap">
                                <i data-lucide="clock" class="w-3 h-3 text-slate-500"></i> ${safeText(f.etd_zulu)}
                            </span>
                            <div class="w-full h-px bg-slate-700 relative">
                                <i data-lucide="plane" class="w-3.5 h-3.5 text-slate-500 absolute -top-[7px] left-1/2 -translate-x-1/2 rotate-90"></i>
                            </div>
                        </div>
                        <div class="text-2xl font-mono font-bold text-white">${safeText(f.dest_icao)}</div>
                    </div>

                    <div class="flex items-center text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-4 px-1 min-w-0">
                        <div class="flex gap-4 min-w-0">
                            <span class="truncate"><span class="text-slate-600">A/C:</span> <span class="text-slate-300 ml-1">${safeText(f.aircraft_type || 'N/A')}</span></span>
                            <span class="truncate"><span class="text-slate-600">MTOW:</span> <span class="text-slate-300 ml-1">${f.mtow ? safeText(f.mtow) + ' KG' : 'N/A'}</span></span>
                        </div>
                        ${servicesSection}
                    </div>

                    ${!isArchived ? `<div class="grid grid-cols-2 gap-x-2 gap-y-1 mt-auto mb-5 border-t border-slate-800 pt-4">${checklistHTML}</div>` : '<div class="mt-auto"></div>'}

                    <div class="flex items-center justify-between border-t border-slate-800 pt-4 mt-auto">
                        ${!isArchived ? `
                        <select onchange="updateStatus('${f.id}', this.value);" onclick="event.stopPropagation();" class="status-dropdown bg-transparent border border-slate-700 rounded-md px-2 py-1.5 text-[10px] font-semibold text-slate-300 hover:text-white hover:border-slate-500 cursor-pointer focus:border-sky-500 outline-none transition-colors max-w-[120px]">
                            <option value="Pending" ${f.status === 'Pending' ? 'selected' : ''}>Status: Pending</option>
                            <option value="Ready" ${f.status === 'Ready' ? 'selected' : ''}>Status: Ready</option>
                            <option value="Departed" ${f.status === 'Departed' ? 'selected' : ''}>Status: Departed</option>
                            <option value="Arrived" ${f.status === 'Arrived' ? 'selected' : ''}>Status: Arrived</option>
                        </select>
                        ` : `<span class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest shrink-0">Record Closed</span>`}
                        
                        <button type="button" onclick="flipCard('card-${f.id}')" class="text-[10px] font-semibold text-sky-400 hover:text-sky-300 flex items-center gap-1.5 transition-colors bg-sky-500/10 hover:bg-sky-500/20 px-3 py-1.5 rounded-md shrink-0">
                            Mission Log <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>
            `;

            // BACK CARD (Secured Output)
            const backCard = `
                <div class="p-4 sm:p-6 flex flex-col h-full bg-slate-900 rounded-[1rem] relative overflow-hidden">
                    <div class="flex items-center justify-between mb-4 border-b border-slate-800 pb-4 gap-3">
                        <h3 class="text-sm font-bold text-white tracking-wide shrink-0">Mission Log</h3>
                        <div class="flex gap-2 overflow-x-auto hide-scroll pb-1 items-center">
                            <button type="button" onclick="toggleRemarks('${f.id}', event)" class="flex items-center gap-1.5 text-[10px] font-semibold uppercase tracking-wider text-amber-400 bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/20 px-2.5 py-1.5 rounded-md transition-colors shrink-0">
                                <i data-lucide="message-square" class="w-3.5 h-3.5"></i> Remarks
                            </button>
                            <button type="button" onclick="scheduleNextLeg('${f.id}', event)" class="flex items-center gap-1.5 text-[10px] font-semibold uppercase tracking-wider text-emerald-400 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 px-2.5 py-1.5 rounded-md transition-colors shrink-0">
                                <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> Next Leg
                            </button>
                            <button type="button" onclick="downloadFlightSummary('${f.id}', event)" class="flex items-center gap-1.5 text-[10px] font-semibold uppercase tracking-wider text-sky-400 bg-sky-500/10 hover:bg-sky-500/20 border border-sky-500/20 px-2.5 py-1.5 rounded-md transition-colors shrink-0">
                                <i data-lucide="download" class="w-3.5 h-3.5"></i> PDF
                            </button>
                            <button type="button" onclick="closeFlipCard('card-${f.id}', event)" class="text-slate-500 hover:text-white p-1 transition-colors shrink-0"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    
                    <div class="text-center mb-5 min-w-0 px-2">
                        <h2 class="text-xl font-mono font-bold text-white leading-none mb-1.5 truncate">${safeText(f.tail_number)}</h2>
                        <p class="text-[10px] text-slate-400 font-semibold tracking-widest uppercase truncate">${safeText(f.origin_icao)} <i data-lucide="arrow-right" class="w-2.5 h-2.5 inline mx-1"></i> ${safeText(f.dest_icao)}</p>
                    </div>

                    <div class="flex-1 bg-slate-950 rounded-xl border border-slate-800 p-4 flex flex-col justify-center">
                        <div class="manifest-row"><span class="manifest-label shrink-0 mr-2">Call Sign</span><span class="manifest-value truncate">${safeText(f.call_sign || 'TBA')}</span></div>
                        <div class="manifest-row"><span class="manifest-label shrink-0 mr-2">Captain</span><span class="manifest-value text-slate-300 truncate">${safeText(f.captain || 'TBA')}</span></div>
                        <div class="manifest-row"><span class="manifest-label shrink-0 mr-2">Crew / Pax</span><span class="manifest-value shrink-0">${safeText(f.crew_count || '0')} <span class="text-slate-600 font-normal px-1">/</span> ${safeText(f.pax_count || '0')}</span></div>
                        <div class="manifest-row"><span class="manifest-label shrink-0 mr-2">Permit No</span><span class="manifest-value truncate ${f.permit_number ? 'text-sky-400' : 'text-orange-400'}">${safeText(f.permit_number || 'AWAITED')}</span></div>
                        <div class="manifest-row"><span class="manifest-label shrink-0 mr-2">Handling</span><span class="manifest-value truncate">${f.mission_type === 'overflying' ? 'N/A' : safeText(f.ground_handling || 'TBA')}</span></div>
                    </div>

                    <div id="remarks-${f.id}" class="absolute inset-x-0 bottom-0 top-1/4 bg-slate-900/95 backdrop-blur-md z-20 flex flex-col p-6 transition-transform duration-300 translate-y-full border-t border-slate-700 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                        <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                            <h3 class="text-sm font-bold text-amber-400 tracking-wide flex items-center gap-2"><i data-lucide="message-square" class="w-4 h-4"></i> Dispatch Remarks</h3>
                            <button type="button" onclick="toggleRemarks('${f.id}', event)" class="text-slate-400 hover:text-white p-1.5 transition-colors bg-slate-800 rounded-md hover:bg-slate-700"><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                        </div>
                        <div class="flex-1 overflow-y-auto custom-scrollbar text-left pr-2">
                            ${f.remarks ? `<p class="text-xs text-slate-200 leading-relaxed font-sans whitespace-pre-wrap">${safeText(f.remarks)}</p>` : `<p class="text-xs text-slate-500 italic">No notes attached to this mission.</p>`}
                        </div>
                    </div>
                </div>
            `;

            return `<div id="card-${f.id}" class="card-flip flight-card ${borderClass}">
                <div class="card-flip-inner">
                    <div class="card-front">${frontCard}</div>
                    <div class="card-back">${backCard}</div>
                </div>
            </div>`;
        }

        function subscribeToChanges() { 
            if (!fleetChannel) { fleetChannel = _supabase.channel('fleet').on('postgres_changes', { event: '*', schema: 'public', table: 'vvip_flights' }, () => fetchFlights()).subscribe(); }
            if (!logsChannel) { logsChannel = _supabase.channel('logs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'vvip_logs' }, () => { if (currentUserRole === 'admin') { document.getElementById('notif-dot')?.classList.remove('hidden'); fetchLogs(); } }).subscribe(); }
        }

        async function handleLogout() {
            if (fleetChannel) { await _supabase.removeChannel(fleetChannel); fleetChannel = null; }
            if (logsChannel) { await _supabase.removeChannel(logsChannel); logsChannel = null; }
            await _supabase.auth.signOut();
            window.location.reload();
        }
        window.onload = checkSession;
    </script>
